<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Önskelista</title>
    <link rel="icon" href="images/[icon] felixledung.jpg">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-container">
        <div class="gray-background"></div>
        <h1 class="title">Önskelista Jul 2023</h1>
        <div class="glass">
            <ol class="whishes">
                <li>Dator <i>(då mitt batteri har svullit och datorn då har spruckit. Är då inte riktigt en "bärbar dator", eftersom den inte går att ta med då datorn inte går att fälla ihop.)</i></li>
                <li><a href="https://www.kjell.com/se/produkter/dator/skarmfaste/vaggfaste-for-skarm/luxorparts-3-ledat-vaggfaste-for-skarm-13-27-p57573" target="_blank">Skärmfäste</a></li>
            </ol>
        </div>

        <h4 class="countertitle">Days Until Christmas</h4>
        <div class="timer">
            <div class="sub_timer">
                <h1 id="day" class="digit">00</h1>
                <p class="digit_name">Days</p>
            </div>
            <div class="sub_timer">
                <h1 id="hour" class="digit">00</h1>
                <p class="digit_name">Hours</p>
            </div>
            <div class="sub_timer">
                <h1 id="min" class="digit">00</h1>
                <p class="digit_name">Minutes</p>
            </div>
            <div class="sub_timer">
                <h1 id="sec" class="digit">00</h1>
                <p class="digit_name">Seconds</p>
            </div>
        </div>
        <div class="color-box"></div>
        <div class="gradient-container"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
